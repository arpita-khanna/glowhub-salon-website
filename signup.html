<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | GlowHub</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <section class="modern-login">

        <div class="login-card">

            <h1>Create Account</h1>

            <p>
                Join GlowHub and begin your luxury beauty journey today.
            </p>

            <form id="signupForm">

                <input
type="text"
id="signupName"
placeholder="Full Name"
required>

               <input
type="email"
id="signupEmail"
placeholder="Email Address"
required>

                <input
type="password"
id="signupPassword"
placeholder="Create Password"
required>

                

                <button type="submit" class="login-btn">
                    Create Account
                </button>

            </form>

            <div class="login-links">

                <div class="member-option">

                    <p>
                        Already a member?
                    </p>

                    <a href="login.html">
                        Login
                    </a>

                </div>

            </div>

        </div>

    </section>

    <script src="js/script.js"></script>

</body>

</html>
